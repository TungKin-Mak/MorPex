name: MorPex E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      headed:
        description: 'Run with headed browser'
        required: false
        default: false
        type: boolean

jobs:
  e2e-tests:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PORT: 8080
      VITE_PORT: 3000
      BACKEND_URL: http://127.0.0.1:8080
      FRONTEND_URL: http://127.0.0.1:3000
      HEADLESS: 'true'
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'sk-test-key' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build frontend
        run: npm run studio:build

      - name: Run E2E tests (quick mode)
        run: npx tsx scripts/run-e2e-tests.ts --quick --ci
        env:
          NODE_ENV: test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/studio/ui/e2e/report/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: packages/studio/ui/e2e/screenshots/
          retention-days: 7

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: logs/
          retention-days: 7
