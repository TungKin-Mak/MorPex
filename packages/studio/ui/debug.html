<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORPEX OBSERVABILITY — DEBUG PANEL v9.1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2128;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-yellow: #d29922;
    --accent-purple: #bc8cff;
    --node-idle: #30363d;
    --node-running: #58a6ff;
    --node-success: #3fb950;
    --node-failed: #f85149;
    --node-retry: #d29922;
  }

  html { background: var(--bg-primary); }
  body {
    margin: 0;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  #root { height: 100vh; display: flex; flex-direction: column; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* Status colors */
  .status-idle { color: var(--node-idle); }
  .status-running { color: var(--node-running); }
  .status-success { color: var(--node-success); }
  .status-failed { color: var(--node-failed); }
  .status-retry { color: var(--node-retry); }
</style>
<script type="module" src="./ts/debug/main.tsx"></script>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-family:'JetBrains Mono',monospace;">
      <div style="text-align:center;">
        <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;">Observability Plane</div>
        <div style="font-size:10px;color:var(--text-secondary);">Loading Trace Inspector v9.1...</div>
      </div>
    </div>
  </div>
</body>
</html>
