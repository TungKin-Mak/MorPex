<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTROM KERNEL — TELEMETRY PANEL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  html { background: #0a0b0d; }
  body { margin: 0; background: #0a0b0d; }
  #loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0b0d; color: #d8dadc;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    transition: opacity 0.5s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  .load-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px;
    width: 24px; height: 24px;
  }
  .load-cell {
    width: 6px; height: 6px;
    background: rgba(255,255,255,0.04);
    animation: gridPulse 1.2s ease-in-out infinite;
  }
  .load-cell:nth-child(1) { animation-delay: 0s; }
  .load-cell:nth-child(2) { animation-delay: 0.1s; }
  .load-cell:nth-child(3) { animation-delay: 0.2s; }
  .load-cell:nth-child(4) { animation-delay: 0.3s; }
  .load-cell:nth-child(5) { animation-delay: 0.4s; }
  .load-cell:nth-child(6) { animation-delay: 0.5s; }
  .load-cell:nth-child(7) { animation-delay: 0.6s; }
  .load-cell:nth-child(8) { animation-delay: 0.7s; }
  .load-cell:nth-child(9) { animation-delay: 0.8s; }
  @keyframes gridPulse {
    0%, 100% { background: rgba(255,255,255,0.04); }
    50% { background: rgba(255, 42, 42, 0.6); }
  }
  .load-title {
    margin-top: 16px;
    font-size: 14px;
    letter-spacing: 4px;
    color: #d8dadc;
    font-weight: bold;
    text-transform: uppercase;
  }
  .load-sub {
    margin-top: 4px;
    font-size: 8px;
    letter-spacing: 2px;
    color: #787a7e;
    text-transform: uppercase;
  }
  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 2px; height: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,42,42,0.3); }
  ::-webkit-scrollbar-thumb:hover { background: #ff2a2a; }
  * { scrollbar-width: thin; scrollbar-color: rgba(255,42,42,0.3) transparent; }
</style>
<script type="module" src="./ts/main.tsx"></script>
</head>
<body>
  <div id="loading-screen">
    <div class="load-grid">
      <div class="load-cell"></div><div class="load-cell"></div><div class="load-cell"></div>
      <div class="load-cell"></div><div class="load-cell"></div><div class="load-cell"></div>
      <div class="load-cell"></div><div class="load-cell"></div><div class="load-cell"></div>
    </div>
    <div class="load-title">ASTROM KERNEL</div>
    <div class="load-sub">TELEMETRY PANEL v4.2</div>
  </div>
  <div id="root"></div>
  <div id="toast-container"></div>
</body>
</html>
