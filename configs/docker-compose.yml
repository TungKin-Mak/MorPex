version: '3.8'

services:
  morpex:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - MORPEX_DB_PATH=/data/morpex-events.db
      - MORPEX_EVENT_LOG_PATH=/data/events/event-store.jsonl
    volumes:
      - morpex-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  embedding:
    build:
      context: ../tools-python
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - MODEL_PATH=/models/bge-m3
    volumes:
      - embedding-models:/models
    restart: unless-stopped
    profiles:
      - full

volumes:
  morpex-data:
  embedding-models:
