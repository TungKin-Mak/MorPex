# ═══════════════════════════════════════════════════════════════
# Morpex v1.8 — Docker Compose 完整部署
#
# 用法:
#   docker compose up -d                          # 启动所有服务
#   docker compose up -d morpex-backend           # 仅启动后端
#   docker compose logs -f                        # 查看日志
#   docker compose down                           # 停止
#
# 环境变量文件 (.env):
#   DEEPSEEK_API_KEY=sk-xxxx                     # 必需
#   LLM_MODEL=deepseek-chat                      # 可选
#   DOMAIN=morpex.example.com                    # 可选 (Nginx SSL)
# ═══════════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════
  # 1. Embedding Server (BGE-M3)
  # ═══════════════════════════════════════════════════════════
  morpex-embedding:
    image: morpex-embedding:latest
    build:
      context: .
      dockerfile: Dockerfile.embedding
    container_name: morpex-embedding
    ports:
      - "3100:3100"
    volumes:
      - morpex-models:/app/data/models
    environment:
      - MODEL_PATH=/app/data/models/bge-m3
      - PORT=3100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s  # BGE-M3 加载需要时间
      retries: 3
    networks:
      - morpex-net
    deploy:
      resources:
        reservations:
          memory: 3G
        limits:
          memory: 4G

  # ═══════════════════════════════════════════════════════════
  # 2. Backend API (Node.js)
  # ═══════════════════════════════════════════════════════════
  morpex-backend:
    image: morpex:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morpex-backend
    ports:
      - "8080:8080"
    volumes:
      - morpex-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - EMBEDDING_URL=http://morpex-embedding:3100/mcp
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      morpex-embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - morpex-net
    deploy:
      resources:
        limits:
          memory: 2G

  # ═══════════════════════════════════════════════════════════
  # 3. Nginx 反向代理 (可选，用于生产环境)
  # ═══════════════════════════════════════════════════════════
  morpex-nginx:
    image: nginx:alpine
    container_name: morpex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./deploy/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    depends_on:
      morpex-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - morpex-net
    profiles:
      - nginx  # 仅通过 `docker compose --profile nginx up -d` 启动

# ═══════════════════════════════════════════════════════════════
# 持久化卷
# ═══════════════════════════════════════════════════════════════
volumes:
  morpex-data:
    driver: local
  morpex-models:
    driver: local

# ═══════════════════════════════════════════════════════════════
# 内部网络
# ═══════════════════════════════════════════════════════════════
networks:
  morpex-net:
    driver: bridge
